<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Agora Data Driven -- Dashboard</title>
<style>
  :root {
    --ag-bg:#0b1020; --ag-surface:#141b33; --ag-ink:#eaf0ff; --ag-muted:#9aa7c7;
    --ag-accent:#5b8cff; --ag-accent-2:#27d3a2; --ag-danger:#ff5c7a; --ag-border:#26314f;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    background: var(--ag-bg); color: var(--ag-ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    padding: 28px 20px 48px;
  }
  .wrap { max-width: 1080px; margin: 0 auto; }
  header { display: flex; flex-wrap: wrap; align-items: baseline; gap: 12px; margin-bottom: 6px; }
  .brand { font-size: 22px; font-weight: 700; letter-spacing: 0.2px; }
  .brand .dot { color: var(--ag-accent-2); }
  .client { font-size: 16px; color: var(--ag-muted); }
  .meta { color: var(--ag-muted); font-size: 13px; margin-bottom: 26px; }
  .meta span { white-space: nowrap; }
  .meta .sep { opacity: 0.5; padding: 0 8px; }
  #status { color: var(--ag-muted); font-size: 15px; padding: 40px 0; }
  #status.error { color: var(--ag-danger); }
  .kpis {
    display: grid; gap: 14px; margin-bottom: 30px;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  }
  .kpi {
    background: var(--ag-surface); border: 1px solid var(--ag-border); border-radius: 12px;
    padding: 16px 16px 14px;
  }
  .kpi .label { font-size: 12px; text-transform: uppercase; letter-spacing: 0.6px; color: var(--ag-muted); }
  .kpi .value { font-size: 24px; font-weight: 700; margin-top: 8px; }
  .kpi .value.good { color: var(--ag-accent-2); }
  .panel {
    background: var(--ag-surface); border: 1px solid var(--ag-border); border-radius: 12px;
    padding: 18px; margin-bottom: 22px;
  }
  .panel h2 { margin: 0 0 14px; font-size: 14px; text-transform: uppercase; letter-spacing: 0.6px; color: var(--ag-muted); }
  .spark { width: 100%; height: 120px; display: block; }
  .tablewrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 640px; }
  th, td { text-align: right; padding: 8px 10px; border-bottom: 1px solid var(--ag-border); white-space: nowrap; }
  th:first-child, td:first-child { text-align: left; }
  thead th { color: var(--ag-muted); font-weight: 600; text-transform: uppercase; font-size: 11px; letter-spacing: 0.5px; }
  tbody tr:hover { background: rgba(91,140,255,0.08); }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="brand">Agora Data Driven<span class="dot">.</span></div>
      <div class="client" id="clientName"></div>
    </header>
    <div class="meta" id="meta"></div>
    <div id="status">Loading dashboard...</div>
    <div id="content" style="display:none">
      <div class="kpis" id="kpis"></div>
      <div class="panel">
        <h2>Revenue (last 30 days)</h2>
        <svg class="spark" id="spark" preserveAspectRatio="none" viewBox="0 0 600 120" role="img" aria-label="Daily revenue sparkline"></svg>
      </div>
      <div class="panel">
        <h2>Daily performance</h2>
        <div class="tablewrap">
          <table id="daily">
            <thead>
              <tr>
                <th>Date</th><th>Sessions</th><th>Users</th><th>Conversions</th>
                <th>Spend</th><th>Revenue</th><th>ROAS</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

<script>
  // ES5/ES2015-safe ONLY. Do NOT use optional chaining (?.) or nullish coalescing (??):
  // esprima 4.x (the pre-deploy JS gate) cannot parse them. Use classic && / || guards.
  // A JS syntax error here would strand the page forever on "Loading dashboard...".

  function fmtInt(n) {
    if (n === null || n === undefined || isNaN(n)) { return "-"; }
    return Math.round(Number(n)).toLocaleString("en-US");
  }
  function fmtMoney(n) {
    if (n === null || n === undefined || isNaN(n)) { return "-"; }
    return "$" + Number(n).toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }
  function fmtRoas(n) {
    if (n === null || n === undefined || isNaN(n)) { return "-"; }
    return Number(n).toFixed(2) + "x";
  }

  function kpiCard(label, value, good) {
    var cls = good ? "value good" : "value";
    return '<div class="kpi"><div class="label">' + label + '</div>' +
           '<div class="' + cls + '">' + value + '</div></div>';
  }

  function renderKpis(k) {
    if (!k) { return; }
    var html = "";
    html += kpiCard("Sessions", fmtInt(k.sessions), false);
    html += kpiCard("Users", fmtInt(k.users), false);
    html += kpiCard("Conversions", fmtInt(k.conversions), false);
    html += kpiCard("Spend", fmtMoney(k.spend), false);
    html += kpiCard("Revenue", fmtMoney(k.revenue), false);
    html += kpiCard("ROAS", fmtRoas(k.roas), true);
    html += kpiCard("Days covered", fmtInt(k.days_covered), false);
    document.getElementById("kpis").innerHTML = html;
  }

  function renderSpark(daily) {
    var svg = document.getElementById("spark");
    if (!daily || !daily.length) { return; }
    var W = 600, H = 120, pad = 6;
    var max = 0;
    var i;
    for (i = 0; i < daily.length; i++) {
      var r = Number(daily[i].revenue);
      if (!isNaN(r) && r > max) { max = r; }
    }
    if (max <= 0) { max = 1; }
    var n = daily.length;
    var bw = (W - pad * 2) / n;
    var bars = "";
    for (i = 0; i < n; i++) {
      var rev = Number(daily[i].revenue);
      if (isNaN(rev) || rev < 0) { rev = 0; }
      var h = (rev / max) * (H - pad * 2);
      var x = pad + i * bw;
      var y = H - pad - h;
      bars += '<rect x="' + x.toFixed(1) + '" y="' + y.toFixed(1) +
              '" width="' + Math.max(1, bw - 1).toFixed(1) + '" height="' + h.toFixed(1) +
              '" fill="#5b8cff" rx="1"></rect>';
    }
    svg.innerHTML = bars;
  }

  function renderTable(daily) {
    var tbody = document.querySelector("#daily tbody");
    if (!daily || !daily.length) {
      tbody.innerHTML = '<tr><td colspan="7">No daily rows.</td></tr>';
      return;
    }
    var rows = "";
    var i;
    for (i = 0; i < daily.length; i++) {
      var d = daily[i];
      rows += "<tr>" +
        "<td>" + (d.metric_date || "-") + "</td>" +
        "<td>" + fmtInt(d.sessions) + "</td>" +
        "<td>" + fmtInt(d.users) + "</td>" +
        "<td>" + fmtInt(d.conversions) + "</td>" +
        "<td>" + fmtMoney(d.spend) + "</td>" +
        "<td>" + fmtMoney(d.revenue) + "</td>" +
        "<td>" + fmtRoas(d.roas) + "</td>" +
      "</tr>";
    }
    tbody.innerHTML = rows;
  }

  function render(data) {
    document.getElementById("clientName").textContent = data.client ? ("/ " + data.client) : "";
    var meta = "";
    if (data.data_through) {
      meta += '<span>data through ' + data.data_through + "</span>";
    }
    if (data.last_updated) {
      if (meta) { meta += '<span class="sep">|</span>'; }
      meta += '<span>updated ' + data.last_updated + "</span>";
    }
    document.getElementById("meta").innerHTML = meta;

    renderKpis(data.kpis);
    renderSpark(data.daily);
    renderTable(data.daily);

    document.getElementById("status").style.display = "none";
    document.getElementById("content").style.display = "block";
  }

  function fail(msg) {
    var s = document.getElementById("status");
    s.className = "error";
    s.textContent = msg;
  }

  function load() {
    fetch("/data.json", { credentials: "same-origin" })
      .then(function (resp) {
        if (!resp.ok) { throw new Error("HTTP " + resp.status); }
        return resp.json();
      })
      .then(function (data) { render(data); })
      .catch(function (err) {
        fail("Could not load dashboard data (" + (err && err.message ? err.message : "error") + ").");
      });
  }

</script>
</body>
</html>
